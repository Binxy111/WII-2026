<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wii 2026 - System Menu</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --wii-blue: #00ecff; }
        body { 
            margin: 0; 
            /* 2026 Default Gradient Fallback */
            background: radial-gradient(circle at center, #ffffff 0%, #d6e8f5 50%, #b5d4ef 100%);
            background-image: url('Wiimen.png'); 
            background-size: cover; background-position: center;
            font-family: sans-serif; overflow: hidden; height: 100vh;
        }

        #cursor { 
            position: absolute; width: 45px; height: 60px; 
            background: url('cursor.png') no-repeat center/contain; 
            z-index: 99999; pointer-events: none; will-change: transform;
        }

        /* GRID SYSTEM */
        #grid-viewport { width: 100vw; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .grid { 
            display: grid; grid-template-columns: repeat(4, 180px); 
            grid-template-rows: repeat(3, 110px); gap: 15px; 
            padding: 100px; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .channel { 
            border-radius: 15px; border: 4px solid transparent; 
            background: rgba(255,255,255,0.7); background-size: cover; 
            position: relative; overflow: hidden; transition: 0.2s;
        }
        .empty-slot { background: url('empty.gif') center/cover; }
        .empty-slot::after {
            content: ""; position: absolute; inset: 0;
            background: url('overlay for empty.gif') center/cover; opacity: 0.4;
        }
        .channel.hover { transform: scale(1.05); border-color: var(--wii-blue); box-shadow: 0 0 20px rgba(0,236,255,0.4); }

        /* OVERLAYS */
        #overlay { 
            position: fixed; inset: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        #splash { width: 500px; height: 300px; background-size: contain; background-repeat: no-repeat; margin-bottom: 20px; }
        #btn-start { padding: 15px 60px; border-radius: 40px; border: none; background: var(--wii-blue); color: white; font-weight: bold; font-size: 18px; }
        #btn-start.hover { transform: scale(1.1); box-shadow: 0 5px 15px rgba(0,236,255,0.4); }

        #home-menu-overlay { position: fixed; inset: 0; z-index: 10000; display: none; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); }
        
        .bottom-bar { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 80px; box-sizing: border-box; }
        .sys-btn { width: 110px; height: 110px; background-size: contain; background-repeat: no-repeat; transition: 0.2s; }
        .sys-btn.hover { transform: scale(1.15); }
    </style>
</head>
<body>

<div id="cursor"></div>

<div id="setup" style="position:fixed; inset:0; background:white; z-index:20000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h1 style="font-weight:100; color:#444;">WII <b style="color:var(--wii-blue)">2026</b></h1>
    <button onclick="startHost()" style="padding:15px 40px; background:#000; color:#fff; border-radius:30px; cursor:pointer;">BOOT SYSTEM</button>
    <h2 id="pin-display" style="margin-top:20px; font-family: monospace;"></h2>
</div>

<div id="grid-viewport">
    <div class="grid" id="main-grid">
        <div class="channel" id="mii" style="background-image:url('mii.png')"></div>
        <div class="channel" id="gallery" style="background-image:url('gallery.png')"></div>
        <div class="channel" id="shop" style="background-image:url('wiishop.jpg')"></div>
        <div class="channel empty-slot"></div><div class="channel empty-slot"></div><div class="channel empty-slot"></div>
        <div class="channel empty-slot"></div><div class="channel empty-slot"></div><div class="channel empty-slot"></div>
    </div>
</div>

<div class="bottom-bar">
    <div class="sys-btn" id="wii-options" style="background-image:url('wii button.png')"></div>
    <div class="sys-btn" id="mail" style="background-image:url('envelope button.png')"></div>
</div>

<div id="overlay">
    <div id="splash"></div>
    <button id="btn-start">START</button>
    <button onclick="closeSplash()" style="margin-top:20px; background:none; border:none; color:#666; font-weight:bold; cursor:none;">Back</button>
</div>

<div id="home-menu-overlay"><iframe id="home-frame" src="WII home menu in game.html" style="width:100%; height:100%; border:none;"></iframe></div>

<audio id="bg-music" src="Wii Menu Music 4.mp3" loop></audio>
<audio id="snd-hover" src="assets_audio_button-hover.mp3"></audio>
<audio id="snd-select" src="button-select.mp3"></audio>
<audio id="snd-back" src="assets_audio_back.mp3"></audio>
<audio id="intro-gallery" src="01 - Photo Channel - Channel Intro.mp3"></audio>
<audio id="intro-shop" src="Wii Shop Channel Music 4.mp3" loop></audio>

<script>
    let peer, conn, tX=0, tY=0, cX=0, cY=0, isHomeOpen = false, isSplashOpen = false, activeID = '', gridX = 0;

    function startHost() {
        const pin = "1234";
        peer = new Peer('WII-HOST-' + pin);
        peer.on('connection', c => {
            conn = c;
            document.getElementById('setup').style.display='none';
            document.getElementById('bg-music').play();
            conn.on('data', handleData);
        });
        document.getElementById('pin-display').innerText = "PIN: " + pin;
        loop();
    }

    function handleData(d) {
        if(d.type === 'm') {
            tX = (window.innerWidth/2) + (d.r * 38);
            tY = (window.innerHeight/2) + (d.p * 38);
            if(isHomeOpen) document.getElementById('home-frame').contentWindow.postMessage({t:'p', x:tX, y:tY}, '*');
        }
        if(d.type === 'swipe') {
            gridX += (d.dir === 'left' ? 300 : -300);
            document.getElementById('main-grid').style.transform = `translateX(${gridX}px)`;
        }
        if(d.type === 'click') {
            if(isHomeOpen) document.getElementById('home-frame').contentWindow.postMessage({t:'c'}, '*');
            else performClick();
        }
        if(d.type === 'home') toggleHome();
    }

    function performClick() {
        const h = document.querySelector('.channel.hover, .sys-btn.hover, #btn-start.hover');
        if(!h) return;
        document.getElementById('snd-select').play();
        if(h.classList.contains('channel')) {
            activeID = h.id;
            openSplash(h.id);
        } else if(h.id === 'btn-start') {
            window.location.href = `WII C/${activeID}.html`;
        }
    }

    function openSplash(id) {
        isSplashOpen = true;
        document.getElementById('splash').style.backgroundImage = `url(${id}.png)`;
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('bg-music').pause();
        const intro = document.getElementById(`intro-${id}`);
        if(intro) intro.play();
    }

    function closeSplash() {
        document.getElementById('snd-back').play();
        document.getElementById('overlay').style.display = 'none';
        isSplashOpen = false;
        document.querySelectorAll('audio').forEach(a => { if(a.id.includes('intro')) { a.pause(); a.currentTime = 0; }});
        document.getElementById('bg-music').play();
    }

    function toggleHome() {
        isHomeOpen = !isHomeOpen;
        document.getElementById('home-menu-overlay').style.display = isHomeOpen ? 'block' : 'none';
    }

    function loop() {
        cX += (tX - cX) * 0.15; cY += (tY - cY) * 0.15;
        document.getElementById('cursor').style.transform = `translate(${cX}px, ${cY}px)`;
        const targets = isSplashOpen ? '#btn-start' : '.channel, .sys-btn';
        document.querySelectorAll(targets).forEach(el => {
            const r = el.getBoundingClientRect();
            if(cX > r.left && cX < r.right && cY > r.top && cY < r.bottom) {
                if(!el.classList.contains('hover')) {
                    el.classList.add('hover');
                    document.getElementById('snd-hover').play();
                    if(conn) conn.send({type:'v'});
                }
            } else el.classList.remove('hover');
        });
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
